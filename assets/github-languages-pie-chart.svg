        <text class="txt_7" x="260" y="270" fill="RoyalBlue" stroke="RoyalBlue" stroke-width="1" >Python</text>

        
        
        <!-- Batchfile -->
        <path class="path_8" d="M 60,120 L 42.49769410247241,21.54356654707945 A 100,100 0 0 1 50.5891686681486,20.443803539692 Z" fill="Tomato" stroke="#fff" stroke-width="2"></path>
        <text class="txt_8" x="260" y="290" fill="Tomato" stroke="Tomato" stroke-width="1" >Batchfile</text>

        
        
